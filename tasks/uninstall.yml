---
- name: Check existence of Owncast systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ owncast_identifier }}.service"
  register: owncast_service_stat

- name: Uninstall Owncast systemd services and files
  when: owncast_service_stat.stat.exists | bool
  block:
    - name: Ensure Owncast systemd service is stopped
      ansible.builtin.service:
        name: "{{ owncast_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Owncast systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ owncast_identifier }}.service"
        state: absent

    - name: Ensure Owncast support files do not exist
      ansible.builtin.file:
        path: "{{ owncast_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Owncast image source files path does not exist
      ansible.builtin.file:
        path: "{{ owncast_container_image_self_build_src_files_path }}"
        state: absent

    - name: Ensure Owncast local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ owncast_data_path }}"
      register: owncast_data_path_deletion_result
      changed_when: owncast_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Owncast base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ owncast_base_path }}"
      register: owncast_base_path_deletion_result
      changed_when: owncast_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Owncast container network does not exist
      when: owncast_container_network_deletion_enabled
      block:
        - name: Ensure Owncast container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ owncast_container_network }}"
            state: absent
          register: owncast_network_deletion_result

        - name: Ensure Owncast container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ owncast_container_network }}
          register: owncast_network_deletion_result
          changed_when: owncast_container_network in owncast_network_deletion_result.stdout

- name: Check existence of Owncast local data path
  ansible.builtin.stat:
    path: "{{ owncast_data_path }}"
  register: owncast_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Owncast local data path
  when: owncast_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Owncast instance has been removed, local data remains in `" + owncast_data_path + "`. Feel free to delete it."
        ]
      }}
